name: solixpost

services:
  solixpost-postgres:
    image: postgres:16-alpine
    container_name: solixpost-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: solixpost
    volumes:
      - solixpost-postgres-data:/var/lib/postgresql/data

  solixpost-redis:
    image: redis:7-alpine
    container_name: solixpost-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - solixpost-redis-data:/data

  solixpost-minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: solixpost-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - solixpost-minio-data:/data

volumes:
  solixpost-postgres-data:
  solixpost-redis-data:
  solixpost-minio-data:
